# All values must be configured here before starting the application
cdac.sms.base-url=https://msdgweb.mgov.gov.in/esms/sendsmsrequestDLT
cdac.sms.sender-id=IDKSHA
cdac.sms.username=mlasia-diksha
cdac.sms.password=dikshasp@Dic812sp
cdac.sms.dept-secure-key=67ad2244-58be-4762-be38-96d18ee2cf74

# DLT Template IDs per purpose (register these with your telecom operator via DLT portal)
# IMPORTANT: Get these from your DLT (Distributed Ledger Technology) registration with your telecom operator
# Format: cdac.sms.dlt-templates.<PURPOSE>=<DLT_TEMPLATE_ID>
# 
# Purpose mapping:
#   - signupOtp                     = User signup/registration OTP template
#   - resetPasswordWithOtp          = Password reset OTP template
#   - otpContactUpdateTemplate      = Contact (email/phone) update OTP template
#   - deleteUserAccountTemplate     = Account deletion OTP template (email)
#   - 1307171619784284292           = Delete account template for phone type
#
# Example: 1007XXXXXXXXXX (typically 14-16 digits)
#
# EDIT THESE WITH YOUR ACTUAL DLT TEMPLATE IDs:
cdac.sms.dlt-templates.signupOtp=1107175040990602841
cdac.sms.dlt-templates.resetPasswordWithOtp=1107175041041559818
cdac.sms.dlt-templates.otpContactUpdateTemplate=1307169468397435917
cdac.sms.dlt-templates.deleteUserAccountTemplate=1007XXXXXXXXXX_DELETE_EMAIL
cdac.sms.dlt-templates.deletePhone=1107175041055648550
cdac.sms.dlt-templates.DEFAULT=1007XXXXXXXXXX_DEFAULT

# ===== Notification Settings =====
notification.email.from=supportemail@diksha.gov.in
notification.email.subject=Your OTP Code
# How often (ms) to reset the SMTP transport connection (default 60s)
notification.email.reset-interval-ms=60000
