spring.application.name=OTPUtil
server.port=8080

# ===== Timezone Configuration =====
# All timestamps (createdOn, lastModifiedTime, timestamp) will use IST (Indian Standard Time)
# IST is UTC+5:30
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true

# ===== Cassandra =====
spring.cassandra.keyspace-name=sunbird
spring.cassandra.contact-points=127.0.0.1
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.username=cassandra
spring.cassandra.password=cassandra
spring.cassandra.schema-action=NONE
spring.cassandra.request.timeout=10s
spring.cassandra.connection.connect-timeout=10s
spring.cassandra.connection.init-query-timeout=10s

# ===== Redis =====
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000ms

# ===== Mail (OCI SMTP / Oracle Cloud) =====
spring.mail.host=smtp.email.ap-mumbai-1.oci.oraclecloud.com
spring.mail.port=587
spring.mail.username=ocid1.user.oc1..aaaaaaaaczlh6st7j2l6rz5qmk5aofmfq22r47cmza27srdoieaoegn7kt4a@ocid1.tenancy.oc1..aaaaaaaab2wewusm3ralqbt2k4jnik2doo3uwjhx5h2hwcd4b4jfy35rufqa.fn.com
spring.mail.password=#CLIdDe4}E):xNpV0H!e
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# ===== OTP Settings =====
otp.ttl.seconds=60
otp.max.attempts=3
otp.length=6
# Comma-separated list of valid purposes
# Includes signup template ID for user registration
otp.valid.purposes=signupOtp,resetPasswordWithOtp,otpContactUpdateTemplate,deleteUserAccountTemplate,1307171619784284292
# Default purpose when none is provided (null/empty) - used for signup/registration OTP
otp.default.purpose=signupOtp

# ===== Rate Limiting Settings =====
# Maximum OTP generations allowed per key per hour (default 3)
otp.ratelimit.max-per-hour=3
# Time window for rate limiting in seconds (default 3600 = 1 hour)
otp.ratelimit.window-seconds=3600

# ===== Encryption =====
# Must be 32 bytes (256-bit) for AES-256
otp.encryption.secret=Trigyn@OTPSecretKey#2024$Secure32B

# ===== SMS Settings (configure with your SMS provider) =====
sms.provider.url=http://sms-provider.example.com/send
sms.provider.api-key=your-api-key
sms.provider.sender-id=OTPUTIL

# ===== CDAC SMS Gateway (msdgweb.mgov.gov.in) =====
